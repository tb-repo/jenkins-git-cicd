name: GitHub Actions CI/CD Pipeline
on:
  push:
    branches:
      - main
      - staging
    tags:
      - 'v*'  # Triggers production deploy on tags like v1.0, v2.1.3 etc.
  pull_request:
    branches:
      - main
      - staging
jobs:
  test:
    name: Install Dependencies & Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          cd flask_Practice
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run unit tests
        run: |
          cd flask_Practice
          pytest test_app.py
  deploy-staging:
    name: Deploy to Staging Staging EC2
    needs: test
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      # Copy only flask_Practice contents to temp staging folder on EC2
      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_EC2_IP }}
          username: ${{ secrets.STAGING_EC2_USER }}
          key: ${{ secrets.STAGING_EC2_SSH_KEY }}
          source: "flask_Practice/*"
          target: "~/flask_Practice_temp"
          strip_components: 1
      # Execute deployment steps on remote staging server
      - name: Setup and Launch Staging Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_EC2_IP }}
          username: ${{ secrets.STAGING_EC2_USER }}
          key: ${{ secrets.STAGING_EC2_SSH_KEY }}
          script: |
            rm -rf ~/flask_Practice
            mv ~/flask_Practice_temp ~/flask_Practice
            cd ~/flask_Practice
            
            pkill -f "app.py" || true
            python3 -m venv venv
            . venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            
            echo "MONGO_URI=${{ secrets.MONGO_URI }}" > .env
            echo "SECRET_KEY=${{ secrets.FLASK_SECRET_KEY }}" >> .env
            
            nohup python3 app.py --host=0.0.0.0 --port=5000 > flask.log 2>&1 < /dev/null &
            sleep 2
  deploy-production:
    name: Deploy to Production EC2
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      # Copy only flask_Practice contents to temp production folder on EC2
      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_EC2_IP }}
          username: ${{ secrets.PROD_EC2_USER }}
          key: ${{ secrets.PROD_EC2_SSH_KEY }}
          source: "flask_Practice/*"
          target: "~/flask_Practice_temp"
          strip_components: 1
      # Execute deployment steps on remote production server
      - name: Setup and Launch Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_EC2_IP }}
          username: ${{ secrets.PROD_EC2_USER }}
          key: ${{ secrets.PROD_EC2_SSH_KEY }}
          script: |
            rm -rf ~/flask_Practice
            mv ~/flask_Practice_temp ~/flask_Practice
            cd ~/flask_Practice
            
            pkill -f "app.py" || true
            python3 -m venv venv
            . venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            
            echo "MONGO_URI=${{ secrets.MONGO_URI }}" > .env
            echo "SECRET_KEY=${{ secrets.FLASK_SECRET_KEY }}" >> .env
            
            nohup python3 app.py --host=0.0.0.0 --port=5000 > flask.log 2>&1 < /dev/null &
            sleep 2
