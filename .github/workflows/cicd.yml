name: GitHub Actions CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - staging

jobs:
  test:
    name: Install Dependencies & Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd flask_Practice
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: |
          cd flask_Practice
          pytest test_app.py

  deploy-staging:
    name: Deploy Staging Application
    needs: test
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging  # Instructs GitHub to load secrets from the 'staging' environment
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Debug Secret Presence
        run: |
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "DEBUG: Secret EC2_SSH_KEY is EMPTY"
          else
            echo "DEBUG: Secret EC2_SSH_KEY is POPULATED (Length: ${#KEY})"
          fi
        env:
          KEY: ${{ secrets.EC2_SSH_KEY }}

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_IP }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "flask_Practice/*"
          target: "~/git_cicd/stage_temp"
          strip_components: 1

      - name: Setup and Launch Staging Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_IP }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            rm -rf ~/git_cicd/stage
            mkdir -p ~/git_cicd/stage
            mv ~/git_cicd/stage_temp/* ~/git_cicd/stage/
            rm -rf ~/git_cicd/stage_temp
            cd ~/git_cicd/stage
            
            fuser -k 5100/tcp || true
            
            python3 -m venv venv
            . venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            
            echo "MONGO_URI=${{ secrets.MONGO_URI }}" > .env
            echo "SECRET_KEY=${{ secrets.FLASK_SECRET_KEY }}" >> .env
            
            nohup python3 app.py --host=0.0.0.0 --port=5100 > flask.log 2>&1 < /dev/null &
            sleep 2

  deploy-production:
    name: Deploy Production Application
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production  # Instructs GitHub to load secrets from the 'production' environment
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_IP }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "flask_Practice/*"
          target: "~/git_cicd/prod_temp"
          strip_components: 1

      - name: Setup and Launch Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_IP }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            rm -rf ~/git_cicd/prod
            mkdir -p ~/git_cicd/prod
            mv ~/git_cicd/prod_temp/* ~/git_cicd/prod/
            rm -rf ~/git_cicd/prod_temp
            cd ~/git_cicd/prod
            
            fuser -k 5000/tcp || true
            
            python3 -m venv venv
            . venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            
            echo "MONGO_URI=${{ secrets.MONGO_URI }}" > .env
            echo "SECRET_KEY=${{ secrets.FLASK_SECRET_KEY }}" >> .env
            
            nohup python3 app.py --host=0.0.0.0 --port=5000 > flask.log 2>&1 < /dev/null &
            sleep 2
